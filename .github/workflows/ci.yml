name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "core/**"
      - "ui/**"
      - ".pylintdict"
      - ".pylintrc"
      - ".mypy.ini"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ./core
          uv pip install -e ./ui
          uv pip install -e "core[httpx-instr,openai-instr,ollama-instr,langchain-instr,postgres-sink,mongodb-sink,mysql-sink,sqlite-sink,ui,dev]"

      - name: Run core tests with coverage
        run: COVERAGE_FILE=.coverage.core uv run pytest --rootdir=core --cov=flow_forge_ai core/tests

      - name: Run ui tests with coverage
        run: COVERAGE_FILE=.coverage.ui uv run pytest --rootdir=ui --cov=flow_forge_ai_ui --cov=flow_forge_ai ui/tests

      - name: Merge coverage reports
        run: |
          uv pip install coverage
          uv run coverage combine
          uv run coverage xml -o coverage.xml
          uv run coverage report

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Install System Dictionary Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y enchant-2 hunspell-en-us

      - name: Install dependencies
        run: |
          uv venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ./core
          uv pip install -e ./ui
          uv pip install -e "core[httpx-instr,openai-instr,ollama-instr,langchain-instr,postgres-sink,mongodb-sink,mysql-sink,sqlite-sink,ui,dev]"

      - name: Type Check
        run: uv run mypy ./core ./ui

      - name: Lint
        run: uv run pylint --fail-under=9.0  ./core ./ui

  security:
    name: Security scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ./core
          uv pip install -e ./ui
          uv pip install -e "core[dev]"

      - name: Dependency vulnerability scan
        run: uv run pip-audit

      - name: Static security scan
        run: uv run bandit -r core/src ui/src
