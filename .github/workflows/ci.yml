name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dictionary Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y enchant-2 myspell-en-us

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras

      - name: Type Check
        run: |
          uv run mypy ./src

      - name: Lint
        run: |
          uv run pylint ./src

  security:
    name: Security scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras

      - name: Dependency vulnerability scan
        run: |
          uv run pip-audit

      - name: Static security scan
        run: |
          uv run bandit -r src

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
