# Example 5: LangChain runnable instrumentation with file sink (JSONL)
#
# Install dependencies:
#   pip install flow-forge-ai[langchain-instr]

[[instrumentors]]
class_path = "flow_forge_ai.instrumentation.langchain_instr.LangChainInstrumentor"

[[sinks]]
name = "file log"
class_path = "flow_forge_ai.sinks.file_sink.FileSink"
[sinks.options]
class_path = "flow_forge_ai.sinks.handlers.jsonl_handler.JsonlHandler"
path = "./traces.jsonl"
